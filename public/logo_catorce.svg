  <circle cx="256" cy="256" r="250" fill="black" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Estrella de 14 Puntas (Gran Catorce) -->
  <path d="M256 40 L280 180 L420 160 L320 256 L420 352 L280 332 L256 472 L232 332 L92 352 L192 256 L92 160 L232 180 Z" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- Diseño más preciso de estrella de 14 puntas -->
  <polygon points="256,60 278,160 376,110 326,208 426,230 326,252 426,302 326,324 376,422 278,372 256,472 234,372 136,422 186,324 86,302 186,252 86,230 186,208 136,110 234,160" fill="white" />

